map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream mydhathuru_frontend {
    server 127.0.0.1:4201;
}

upstream mydhathuru_backend {
    server 127.0.0.1:8081;
}

server {
    listen 80;
    listen [::]:80;
    server_name mydhathuru.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 http://www.mydhathuru.com$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name www.mydhathuru.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ^~ /api/ {
        proxy_pass http://mydhathuru_backend;
        include /etc/nginx/snippets/mydhathuru-proxy-headers.conf;
    }

    location ^~ /swagger {
        return 404;
    }

    location ~ ^/(login|forgot-password|reset-password|app)(/|$) {
        return 302 http://app.mydhathuru.com$request_uri;
    }

    location ^~ /portal-admin/ {
        return 302 http://admin.mydhathuru.com$request_uri;
    }

    location / {
        proxy_pass http://mydhathuru_frontend;
        include /etc/nginx/snippets/mydhathuru-proxy-headers.conf;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name app.mydhathuru.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = / {
        return 302 /login;
    }

    location ^~ /portal-admin/ {
        return 302 http://admin.mydhathuru.com$request_uri;
    }

    location ^~ /api/ {
        proxy_pass http://mydhathuru_backend;
        include /etc/nginx/snippets/mydhathuru-proxy-headers.conf;
    }

    location ^~ /swagger {
        return 404;
    }

    location / {
        proxy_pass http://mydhathuru_frontend;
        include /etc/nginx/snippets/mydhathuru-proxy-headers.conf;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.mydhathuru.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = / {
        return 302 /portal-admin/login;
    }

    location ~ ^/(login|forgot-password|reset-password|app)(/|$) {
        return 302 http://app.mydhathuru.com$request_uri;
    }

    location ^~ /api/ {
        proxy_pass http://mydhathuru_backend;
        include /etc/nginx/snippets/mydhathuru-proxy-headers.conf;
    }

    location ^~ /swagger {
        return 404;
    }

    location / {
        proxy_pass http://mydhathuru_frontend;
        include /etc/nginx/snippets/mydhathuru-proxy-headers.conf;
    }
}
