map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream mydhathuru_frontend {
    server 127.0.0.1:4201;
}

upstream mydhathuru_backend {
    server 127.0.0.1:8081;
}

# Apex -> www canonical redirect
server {
    listen 80;
    listen [::]:80;
    server_name mydhathuru.com;
    return 301 https://www.mydhathuru.com$request_uri;
}

# ACME + HTTP -> HTTPS redirect for all live hosts
server {
    listen 80;
    listen [::]:80;
    server_name www.mydhathuru.com app.mydhathuru.com admin.mydhathuru.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.mydhathuru.com;

    ssl_certificate /etc/letsencrypt/live/www.mydhathuru.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.mydhathuru.com/privkey.pem;

    location ^~ /api/ {
        proxy_pass http://mydhathuru_backend;
        include /etc/nginx/snippets/mydhathuru-proxy-headers.conf;
    }

    location ^~ /swagger {
        return 404;
    }

    location ~ ^/(login|forgot-password|reset-password|app)(/|$) {
        return 302 https://app.mydhathuru.com$request_uri;
    }

    location ^~ /portal-admin/ {
        return 302 https://admin.mydhathuru.com$request_uri;
    }

    location / {
        proxy_pass http://mydhathuru_frontend;
        include /etc/nginx/snippets/mydhathuru-proxy-headers.conf;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.mydhathuru.com;

    ssl_certificate /etc/letsencrypt/live/www.mydhathuru.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.mydhathuru.com/privkey.pem;

    location = / {
        return 302 /login;
    }

    location ^~ /portal-admin/ {
        return 302 https://admin.mydhathuru.com$request_uri;
    }

    location ^~ /api/ {
        proxy_pass http://mydhathuru_backend;
        include /etc/nginx/snippets/mydhathuru-proxy-headers.conf;
    }

    location ^~ /swagger {
        return 404;
    }

    location / {
        proxy_pass http://mydhathuru_frontend;
        include /etc/nginx/snippets/mydhathuru-proxy-headers.conf;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.mydhathuru.com;

    ssl_certificate /etc/letsencrypt/live/www.mydhathuru.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.mydhathuru.com/privkey.pem;

    location = / {
        return 302 /portal-admin/login;
    }

    location ~ ^/(login|forgot-password|reset-password|app)(/|$) {
        return 302 https://app.mydhathuru.com$request_uri;
    }

    location ^~ /api/ {
        proxy_pass http://mydhathuru_backend;
        include /etc/nginx/snippets/mydhathuru-proxy-headers.conf;
    }

    location ^~ /swagger {
        return 404;
    }

    location / {
        proxy_pass http://mydhathuru_frontend;
        include /etc/nginx/snippets/mydhathuru-proxy-headers.conf;
    }
}
