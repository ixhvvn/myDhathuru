map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream frontend_upstream {
    server frontend:80;
}

upstream backend_upstream {
    server backend:8080;
}

server {
    listen 80;
    server_name mydhathuru.com;
    return 301 $scheme://www.mydhathuru.com$request_uri;
}

server {
    listen 80;
    server_name www.mydhathuru.com;

    location ^~ /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location ^~ /swagger {
        return 404;
    }

    location ~ ^/(login|forgot-password|reset-password|app)(/|$) {
        return 302 https://app.mydhathuru.com$request_uri;
    }

    location ^~ /portal-admin/ {
        return 302 https://admin.mydhathuru.com$request_uri;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

